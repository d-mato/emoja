name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true

      - name: Install gem-release
        run: gem install gem-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit, tag, push
        id: version
        run: |
          gem bump --version ${{ inputs.bump }} --tag --push
          new=$(ruby -r ./lib/emoja/version -e 'print Emoja::VERSION')
          echo "tag=v${new}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish gem to RubyGems
        uses: rubygems/release-gem@v1
